services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    restart: unless-stopped
    environment:
      MODE: json-rpc
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    ports:
      # Only needed during initial QR linking. Remove this mapping after Signal is linked;
      # the autoresponder container reaches signal-api over the internal Docker network.
      - "8080:8080"

  autoresponder:
    build: .
    container_name: autoresponder
    restart: unless-stopped
    depends_on:
      - signal-api
    environment:
      TG_USER_BOT_API_ID: "${TG_USER_BOT_API_ID}"
      TG_USER_BOT_API_HASH: "${TG_USER_BOT_API_HASH}"
      TG_CONTROL_BOT_TOKEN: "${TG_CONTROL_BOT_TOKEN}"
      TG_OWNER_USER_ID: "${TG_OWNER_USER_ID}"
      SIGNAL_API_URL: "${SIGNAL_API_URL:-http://signal-api:8080}"
      SIGNAL_PHONE_NUMBER: "${SIGNAL_PHONE_NUMBER:-}"
      TIMEZONE: "${TIMEZONE:-Europe/Berlin}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - ./data:/data
